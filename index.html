.btn{
    flex:1;

    border:2px solid #fff;

    padding:10px;
    color:#fff;
    font-weight:600;
    text-decoration:none;
    display:flex;

.btn:hover{

.btn svg{

    height:18px;

    background:#fff;

    border:none;
    border-radius:10px;
    padding:12px;
    font-weight:700;
    cursor:pointer;
    width:100%;
}

/* Overlay Backdrop - semi transparent */
.popup-backdrop {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(8px);
    z-index: 9999;
    display: none;
    animation: fadeIn 0.3s ease-out forwards;
}

@keyframes fadeIn {
    from {
        opacity: 0;
    }
    to {
        opacity: 1;
    }
}

/* Modern Telegram Popup - SMALLER VERSION (reduced size, compact padding) */
.telegram-popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: linear-gradient(135deg, #ffffff 0%, #f8f9ff 100%);
    backdrop-filter: blur(25px);
    border: 1.5px solid rgba(13, 110, 253, 0.2);
    padding: 1.2rem 1.2rem;
    border-radius: 24px;
    z-index: 10000;
    text-align: center;
    width: 80%;
    max-width: 290px;
    display: none;
    box-shadow: 0 20px 40px -12px rgba(13, 110, 253, 0.25), 
                0 0 0 1px rgba(255, 255, 255, 0.5) inset;
    animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    opacity: 0;
}

@keyframes slideUp {
    to {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
    }
}

.telegram-popup h2 {
    color: #1e293b;
    font-size: 1.2rem;
    margin: 0 0 0.4rem 0;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    font-weight: 700;
    letter-spacing: -0.2px;
}

.telegram-popup .fa-telegram {
    color: #2AABEE;
    font-size: 1.2rem;
}

.telegram-popup p {
    color: #64748b;
    font-size: 0.8rem;
    margin: 0 0 0.9rem 0;
    line-height: 1.4;
    font-weight: 500;
}

.telegram-popup .popup-button {
    width: 100%;
    padding: 0.7rem;
    margin-top: 0.45rem;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.85rem;
    text-decoration: none;
    display: inline-block;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    border: none;
    font-family: inherit;
    box-sizing: border-box;
}

.telegram-popup .join-btn {
    background: linear-gradient(135deg, #2AABEE 0%, #1e98d4 100%);
    color: white;
    box-shadow: 0 4px 14px rgba(42, 171, 238, 0.3);
    margin-top: 0.5rem;
}

.telegram-popup .join-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 22px rgba(42, 171, 238, 0.4);
}

.telegram-popup .join-btn:active {
    transform: translateY(-1px);
}

.telegram-popup .joined-btn {
    background: rgba(42, 171, 238, 0.08);
    color: #2AABEE;
    border: 1.5px solid rgba(42, 171, 238, 0.2);

}

.telegram-popup .joined-btn:hover {

    border-color: rgba(42, 171, 238, 0.3);
}

.telegram-popup .joined-btn:active {
    background: rgba(42, 171, 238, 0.15);
}

<script>

document.addEventListener("DOMContentLoaded",function(){

// GET ID PARAM
const params=new URLSearchParams(window.location.search);
const id=params.get("id");

const playerContainer=document.getElementById("player-container");
const errorBox=document.getElementById("errorBox");

if(!id){
    errorBox.style.display="block";
    return;
}

// FETCH JSON
fetch("https://allrounderid2.pages.dev/id.json")
.then(res=>res.json())
.then(data=>{

if(!data.iframes || !Array.isArray(data.iframes)){
    errorBox.style.display="block";
    return;
}

const match=data.iframes.find(item=>item.id===id);

if(match && match.iframeSrc){
    playerContainer.innerHTML=`
        <iframe 
            src="${match.iframeSrc}" 
            allow="encrypted-media; autoplay" 
            allowfullscreen>
        </iframe>
    `;
}else{
    errorBox.style.display="block";
}

})
.catch(()=>{
errorBox.style.display="block";
});

document.getElementById("shareBtn").onclick=function(){
navigator.clipboard.writeText(window.location.href)
.then(()=>alert("Link Copied"));
};

});

// Show popup after delay (unchanged behavior, but popup size is now smaller)
setTimeout(() => {
    const popup = document.getElementById('telegramPopup');
    const backdrop = document.getElementById('popupBackdrop');
    if(popup && backdrop) {
        popup.style.display = 'block';
        backdrop.style.display = 'block';
    }
}, 0);

// Function to close popup modal (keeps original behavior)
function closePopupModal() {
    const popup = document.getElementById('telegramPopup');
    const backdrop = document.getElementById('popupBackdrop');
    if(popup) popup.style.display = 'none';
    if(backdrop) backdrop.style.display = 'none';
}

// Close popup when clicking on backdrop
const backdropEl = document.getElementById('popupBackdrop');
if(backdropEl) {
    backdropEl.addEventListener('click', closePopupModal);
}
